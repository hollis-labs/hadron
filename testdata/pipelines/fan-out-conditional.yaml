meta:
  name: fan-out-conditional
stop_on_fail: false
stages:
  - name: A
    blueprint_path: ../blueprints/minimal-success.yaml
  - name: B
    blueprint_path: ../blueprints/minimal-success.yaml
    depends_on:
      - A
  - name: C
    blueprint_path: ../blueprints/minimal-success.yaml
    depends_on:
      - A
    if: '{{ eq .stages.A.status "failed" }}'
