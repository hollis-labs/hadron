meta:
  name: all-deps-skipped
stop_on_fail: false
stages:
  - name: root
    blueprint_path: ../blueprints/minimal-success.yaml
  - name: A
    blueprint_path: ../blueprints/minimal-success.yaml
    depends_on:
      - root
    if: '{{ eq .stages.root.status "failed" }}'
  - name: B
    blueprint_path: ../blueprints/minimal-success.yaml
    depends_on:
      - root
    if: '{{ eq .stages.root.status "failed" }}'
  - name: C
    blueprint_path: ../blueprints/minimal-success.yaml
    depends_on:
      - A
      - B
