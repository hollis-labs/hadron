version: "0.4"

blueprint:
  name: swarm-correlate
  title: "Security Swarm — Correlate"
  tags: [demo, security-swarm]

steps:
  - section: Incident Correlation
    tasks:
      - name: merge-findings
        cmd: |
          echo "[correlate] Merging findings from 4 analysis agents..."
          echo ""
          echo "  INCIDENT TIMELINE:"
          echo "  ┌─────────────────────────────────────────────────────────┐"
          echo "  │ 14:25  jsmith login from 203.0.113.12 (no MFA)        │"
          echo "  │ 14:26  SSH to 10.0.4.37, 10.0.4.38, 10.0.4.41        │"
          echo "  │ 14:27  Dropped binary /tmp/.cache/svchost              │"
          echo "  │ 14:27  Added unauthorized SSH key                      │"
          echo "  │ 14:28  First connection to Tor exit 185.220.101.42     │"
          echo "  │ 14:30  Bulk HTTPS transfer begins (3.2GB)              │"
          echo "  │ 14:34  Transfer complete                               │"
          echo "  │ 14:35  Connection closed                               │"
          echo "  └─────────────────────────────────────────────────────────┘"

      - name: confidence-score
        cmd: |
          echo "[correlate] Confidence assessment:"
          echo "  Threat confirmed : YES"
          echo "  Confidence       : 0.92"
          echo "  Classification   : Data exfiltration via compromised credentials"
          echo "  Severity         : HIGH → CRITICAL (escalated based on data sensitivity)"
          echo "  Timeline entries : 7"
