name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: cmd/hadron-app/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: cmd/hadron-app/frontend
        run: npm ci

      - name: Build binaries
        run: make build

      - name: Run Go tests
        run: make test

      - name: Run frontend tests
        run: make test-ui

      - name: Run frontend typecheck
        run: make typecheck

      - name: Run end-to-end tests
        run: make e2e
