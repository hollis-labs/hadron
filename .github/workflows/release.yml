name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: cmd/hadron-app/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: cmd/hadron-app/frontend
        run: npm ci

      - name: Run verification suite
        run: |
          make build VERSION="${GITHUB_REF_NAME}"
          make test
          make test-ui
          make typecheck
          make e2e

  package:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: verify

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release artifacts
        run: make package-release VERSION="${GITHUB_REF_NAME}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/hadron_*.tar.gz
            dist/checksums.txt
